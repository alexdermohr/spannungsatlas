<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2d5a9b" />
    <title>Spannungsatlas</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      // Minimal FOUC prevention — resolved state becomes initial truth
      (function() {
        var d = 'light';
        try {
          var t = localStorage.getItem('spannungsatlas-theme') || 'system';
          if (t !== 'light' && t !== 'dark' && t !== 'system') t = 'system';

          if (t === 'system') {
            d = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            d = t;
          }
        } catch(e) {}

        try {
          document.documentElement.setAttribute('data-theme', d);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', d === 'dark' ? '#1a1a2e' : '#2d5a9b');
        } catch(e) {}
      })();
    </script>
    %sveltekit.body%
  </body>
</html>
