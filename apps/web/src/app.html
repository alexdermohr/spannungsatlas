<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2d5a9b" />
    <title>Spannungsatlas</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      // Prevent flash of wrong theme — runs before any rendering.
      (function() {
        var t = 'system';
        try { t = localStorage.getItem('spannungsatlas-theme') || 'system'; } catch(e) {}
        var d = 'light';
        if (t === 'light' || t === 'dark') {
          d = t;
        } else {
          try { d = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; } catch(e) {}
        }
        document.documentElement.setAttribute('data-theme', d);
        try {
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', d === 'dark' ? '#1a1a2e' : '#2d5a9b');
        } catch(e) {}
      })();
    </script>
    %sveltekit.body%
  </body>
</html>
